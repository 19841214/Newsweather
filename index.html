<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彰師附工 - 產業新聞</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f7f0;
            color: #2c3e50;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            padding: 18px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header h1 { font-size: 1.5em; font-weight: 700; }
        .header p  { font-size: 0.9em; opacity: 0.85; margin-top: 2px; }

        /* ── 天氣小卡（右上角） ── */
        .weather-chip {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 12px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(4px);
            min-width: 260px;
        }

        .weather-chip select {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.85em;
            cursor: pointer;
        }

        .weather-chip select option { color: #2c3e50; background: white; }

        .weather-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 0.95em;
        }

        .weather-temp {
            font-size: 1.4em;
            font-weight: 700;
            line-height: 1;
        }

        .weather-desc {
            font-size: 0.8em;
            opacity: 0.85;
            max-width: 80px;
            line-height: 1.3;
        }

        /* ── 主內容 ── */
        .main {
            max-width: 960px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ── 搜尋 + 篩選列 ── */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 38px;
            border: 2px solid #c8e6c9;
            border-radius: 8px;
            font-size: 0.95em;
            background: white;
            transition: border-color 0.2s;
        }

        .search-wrap input:focus {
            outline: none;
            border-color: #4caf50;
        }

        .search-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 1em;
        }

        .btn-reset {
            padding: 10px 18px;
            background: white;
            color: #4caf50;
            border: 2px solid #4caf50;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-reset:hover { background: #4caf50; color: white; }

        /* ── 群科標籤 ── */
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tag {
            padding: 5px 14px;
            border: 2px solid #c8e6c9;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.875em;
            color: #4caf50;
            font-weight: 600;
            transition: all 0.15s;
        }

        .tag:hover, .tag.active {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        /* ── 統計列 ── */
        .stats {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 14px;
        }

        .stats span { color: #4caf50; font-weight: 700; }

        /* ── 新聞卡片 ── */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .news-card {
            background: white;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            border-top: 3px solid #4caf50;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .news-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(76,175,80,0.15);
        }

        .news-tag {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 700;
            width: fit-content;
        }

        .news-title {
            font-size: 0.97em;
            font-weight: 600;
            color: #1a1a2e;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-desc {
            font-size: 0.85em;
            color: #666;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .news-date { font-size: 0.8em; color: #bbb; }

        .news-link {
            font-size: 0.82em;
            color: #4caf50;
            font-weight: 700;
            text-decoration: none;
        }

        .news-link:hover { text-decoration: underline; }

        /* ── 載入 & 空狀態 ── */
        .state-box {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            grid-column: 1 / -1;
        }

        .spinner {
            border: 3px solid #e8f5e9;
            border-top: 3px solid #4caf50;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 最後更新 ── */
        .footer-bar {
            text-align: center;
            font-size: 0.8em;
            color: #bbb;
            margin-top: 30px;
            padding-bottom: 30px;
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .weather-chip { min-width: unset; width: 100%; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div>
        <h1>📰 彰師附工 產業新聞</h1>
        <p>每日自動更新 · 按群科篩選</p>
    </div>

    <!-- 天氣小卡 -->
    <div class="weather-chip">
        <select id="location-select" onchange="changeLocation()">
            <option value="彰化縣">彰化縣</option>
            <option value="臺中市">臺中市</option>
            <option value="南投縣">南投縣</option>
            <option value="苗栗縣">苗栗縣</option>
            <option value="基隆市">基隆市</option>
            <option value="臺北市">臺北市</option>
            <option value="新北市">新北市</option>
            <option value="桃園市">桃園市</option>
            <option value="新竹市">新竹市</option>
            <option value="新竹縣">新竹縣</option>
            <option value="宜蘭縣">宜蘭縣</option>
            <option value="花蓮縣">花蓮縣</option>
            <option value="臺東縣">臺東縣</option>
            <option value="嘉義市">嘉義市</option>
            <option value="嘉義縣">嘉義縣</option>
            <option value="臺南市">臺南市</option>
            <option value="高雄市">高雄市</option>
            <option value="屏東縣">屏東縣</option>
            <option value="澎湖縣">澎湖縣</option>
            <option value="金門縣">金門縣</option>
            <option value="連江縣">連江縣</option>
        </select>
        <div class="weather-info" id="weather-info">
            <div>
                <div class="weather-temp" id="w-temp">--</div>
                <div class="weather-desc" id="w-desc">載入中...</div>
            </div>
        </div>
    </div>
</div>

<!-- 主內容 -->
<div class="main">

    <!-- 搜尋列 -->
    <div class="toolbar">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="搜尋新聞標題或內容...">
        </div>
        <button class="btn-reset" onclick="resetFilter()">重設</button>
    </div>

    <!-- 群科標籤 -->
    <div class="tags" id="tags"></div>

    <!-- 統計 -->
    <div class="stats" id="stats"></div>

    <!-- 新聞卡片 -->
    <div class="news-grid" id="news-grid">
        <div class="state-box">
            <div class="spinner"></div>
            <p>正在載入新聞...</p>
        </div>
    </div>

    <div class="footer-bar" id="footer-bar"></div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby5d38TQ_OuEAVTUOMvdXTo_nJvqhBy1vLSV7YuEca68bejBnqRJaDVcU_dVB_7eXcCOQ/exec';

    let allNews = [];
    let selectedCategories = [];
    let selectedLocation = '彰化縣';

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadNews();
        loadWeather();
        document.getElementById('search-input').addEventListener('input', renderNews);
        setInterval(() => { loadNews(); loadWeather(); }, 300000);
    });

    // ── 天氣 ──────────────────────────────

    async function loadWeather() {
        try {
            const res = await fetch(`${WEB_APP_URL}?type=weather&location=${encodeURIComponent(selectedLocation)}`);
            const json = await res.json();
            if (json.status === 'success' && json.data) {
                document.getElementById('w-temp').textContent = json.data.temperature || '--';
                document.getElementById('w-desc').textContent = json.data.description || '';
            } else {
                document.getElementById('w-temp').textContent = '–';
                document.getElementById('w-desc').textContent = '無資料';
            }
        } catch {
            document.getElementById('w-desc').textContent = '無法載入';
        }
    }

    function changeLocation() {
        selectedLocation = document.getElementById('location-select').value;
        document.getElementById('w-temp').textContent = '--';
        document.getElementById('w-desc').textContent = '載入中...';
        loadWeather();
    }

    // ── 新聞 ──────────────────────────────

    async function loadNews() {
        try {
            const res = await fetch(`${WEB_APP_URL}?type=news`);
            const json = await res.json();
            if (json.status === 'success' && json.data) {
                allNews = json.data;
                buildTags();
                renderNews();
                const now = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('footer-bar').textContent = `最後更新：${now}`;
            }
        } catch {
            document.getElementById('news-grid').innerHTML = `
                <div class="state-box"><p>⚠️ 無法載入新聞，請稍後再試</p></div>`;
        }
    }

    function buildTags() {
        const cats = [...new Set(allNews.map(n => n.category))].sort();
        document.getElementById('tags').innerHTML = cats.map(c =>
            `<span class="tag" onclick="toggleTag('${c}')">${c}</span>`
        ).join('');
    }

    function toggleTag(cat) {
        const idx = selectedCategories.indexOf(cat);
        idx > -1 ? selectedCategories.splice(idx, 1) : selectedCategories.push(cat);
        document.querySelectorAll('.tag').forEach(t => {
            t.classList.toggle('active', selectedCategories.includes(t.textContent));
        });
        renderNews();
    }

    function renderNews() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const filtered = allNews.filter(n => {
            const matchQ = !q || n.title.toLowerCase().includes(q) || n.description.toLowerCase().includes(q);
            const matchCat = selectedCategories.length === 0 || selectedCategories.includes(n.category);
            return matchQ && matchCat;
        });

        document.getElementById('stats').innerHTML =
            `顯示 <span>${filtered.length}</span> 則 / 共 ${allNews.length} 則新聞`;

        if (!filtered.length) {
            document.getElementById('news-grid').innerHTML =
                `<div class="state-box"><p>📭 找不到符合的新聞</p></div>`;
            return;
        }

        document.getElementById('news-grid').innerHTML = filtered.map(n => `
            <div class="news-card">
                <span class="news-tag">${n.category}</span>
                <div class="news-title">${n.title}</div>
                <div class="news-desc">${n.description}</div>
                <div class="news-footer">
                    <span class="news-date">${n.date}</span>
                    <a href="${n.url}" target="_blank" class="news-link">閱讀全文 →</a>
                </div>
            </div>
        `).join('');
    }

    function resetFilter() {
        document.getElementById('search-input').value = '';
        selectedCategories = [];
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        renderNews();
    }
</script>
</body>
</html>
